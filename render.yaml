services:
  - type: web
    name: recruit-pipeline
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: "cd backend && pip install -r requirements.txt && cd ../frontend && rm -rf node_modules package-lock.json && npm install && npm run build"
    startCommand: "cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
